services:
  - type: web
    name: glocalizer-api
    runtime: docker
    rootDir: backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PROJECT_TOKEN_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      # Render Starter 플랜(RAM 512MB)에서 PaddleOCR가 메모리를 초과해
      # 인스턴스가 강제 종료되던 문제 대응 — 동시 처리와 입력 해상도를 낮춘다.
      - key: AI_CONCURRENCY
        value: 1
      - key: CLEANUP_CONCURRENCY
        value: 1
      - key: OCR_IMAGE_MAX_DIMENSION
        value: 960
      - key: NODE_OPTIONS
        value: --max-old-space-size=320
